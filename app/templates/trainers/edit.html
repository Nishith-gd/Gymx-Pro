{% extends "base.html" %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h1 class="h2">Edit Trainer</h1>
    <a href="{{ url_for('trainers.index') }}" class="btn btn-outline-secondary">
        <i class="bi bi-arrow-left"></i> Back
    </a>
</div>

<div class="card">
    <div class="card-body">
        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="first_name" class="form-label">First Name</label>
                    <input type="text" class="form-control" id="first_name" name="first_name" required
                           value="{{ form_data.first_name if form_data else trainer.user.first_name }}">
                </div>
                <div class="col-md-6 mb-3">
                    <label for="last_name" class="form-label">Last Name</label>
                    <input type="text" class="form-control" id="last_name" name="last_name" required
                           value="{{ form_data.last_name if form_data else trainer.user.last_name }}">
                </div>
            </div>
            <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <input type="email" class="form-control" id="email" name="email" required
                       value="{{ form_data.email if form_data else trainer.user.email }}">
            </div>
            <div class="mb-3">
                <label for="phone" class="form-label">Phone</label>
                <input type="text" class="form-control" id="phone" name="phone"
                       value="{{ form_data.phone if form_data else (trainer.user.phone or '') }}">
            </div>
            <div class="mb-3">
                <label for="specialization" class="form-label">Specialization</label>
                <input type="text" class="form-control" id="specialization" name="specialization"
                       value="{{ form_data.specialization if form_data else (trainer.specialization or '') }}">
            </div>
            <div class="mb-3">
                <label for="experience_years" class="form-label">Experience (Years)</label>
                <input type="number" class="form-control" id="experience_years" name="experience_years" min="0"
                       value="{{ form_data.experience_years if form_data else (trainer.experience_years or '') }}">
            </div>
            <div class="mb-3">
                <label for="bio" class="form-label">Bio</label>
                <textarea class="form-control" id="bio" name="bio" rows="3">{{ form_data.bio if form_data else (trainer.bio or '') }}</textarea>
            </div>
            <div class="mb-3">
                <label for="new_password" class="form-label">New Password <small class="text-muted">(leave blank to keep current)</small></label>
                <input type="password" class="form-control" id="new_password" name="new_password" placeholder="Min 8 characters">
            </div>
            <button type="submit" class="btn btn-primary">
                <i class="bi bi-save"></i> Save Changes
            </button>
        </form>
    </div>
</div>
{% endblock %}
