{% extends "base.html" %}
{% block auth_content %}
<div class="row justify-content-center align-items-center min-vh-100 py-4">
    <div class="col-md-8 col-lg-7 col-xl-6">
        <div class="card shadow-xl border-0 overflow-hidden">
            <div class="card-body p-md-5 p-4">
                <div class="text-center mb-5">
                    <div class="d-inline-flex align-items-center justify-content-center bg-primary bg-opacity-10 rounded-3 p-3 mb-4">
                        <i class="bi bi-heart-pulse fs-1 text-primary"></i>
                    </div>
                    <h1 class="fw-bold text-dark mb-2">Create Account</h1>
                    <p class="text-muted mb-0">Join GymX Pro today</p>
                </div>
                <form method="POST" class="needs-validation" novalidate>
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <div class="row g-3 mb-4">
                        <div class="col-md-6">
                            <label for="first_name" class="form-label fw-medium text-dark">First Name</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-end-0"><i class="bi bi-person text-muted"></i></span>
                                <input type="text" class="form-control border-start-0 ps-0" id="first_name" name="first_name" required placeholder="John">
                            </div>
                        </div>
                        <div class="col-md-6">
                            <label for="last_name" class="form-label fw-medium text-dark">Last Name</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-end-0"><i class="bi bi-person text-muted"></i></span>
                                <input type="text" class="form-control border-start-0 ps-0" id="last_name" name="last_name" required placeholder="Doe">
                            </div>
                        </div>
                    </div>
                    <div class="mb-4">
                        <label for="email" class="form-label fw-medium text-dark">Email Address</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0"><i class="bi bi-envelope text-muted"></i></span>
                            <input type="email" class="form-control border-start-0 ps-0" id="email" name="email" required placeholder="name@example.com">
                        </div>
                    </div>
                    <div class="mb-5">
                        <label for="password" class="form-label fw-medium text-dark">Password</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0"><i class="bi bi-lock text-muted"></i></span>
                            <input type="password" class="form-control border-start-0 ps-0" id="password" name="password" required placeholder="••••••••">
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-3 fw-medium fs-6">
                        <i class="bi bi-person-plus me-2"></i> Create Account
                    </button>
                </form>
                <div class="text-center mt-5">
                    <p class="text-muted mb-0">Already have an account? 
                        <a href="{{ url_for('auth.login') }}" class="fw-medium text-primary text-decoration-none">Sign In</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
